<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Track Fusion — Common Operating Picture</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080b09;
    --panel: #0e1512;
    --panel-border: #1e2b25;
    --ink: #cfe8db;
    --ink-dim: #6f9482;
    --phosphor: #52e39b;
    --phosphor-dim: #2a7a56;
    --amber: #f0a63b;
    --red: #ff5c5c;
    --grid-line: #142019;
    font-family: "IBM Plex Mono", monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--ink);
  }

  #app {
    display: grid;
    grid-template-rows: 52px 1fr;
    grid-template-columns: 1fr 340px;
    height: 100vh;
  }

  #topbar {
    grid-column: 1 / 3;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 18px;
    background: var(--panel);
    border-bottom: 1px solid var(--panel-border);
    letter-spacing: 0.08em;
  }

  #topbar .title {
    font-size: 13px;
    font-weight: 700;
    color: var(--phosphor);
    text-transform: uppercase;
  }

  #topbar .title span {
    color: var(--ink-dim);
    font-weight: 400;
    margin-left: 10px;
    font-size: 11px;
  }

  #status {
    font-size: 11px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--ink-dim);
  }

  #status .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--red);
    box-shadow: 0 0 6px var(--red);
  }

  #status.live .dot {
    background: var(--phosphor);
    box-shadow: 0 0 6px var(--phosphor);
    animation: pulse 1.6s infinite ease-in-out;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  #map {
    background: var(--bg);
  }

  #sidebar {
    background: var(--panel);
    border-left: 1px solid var(--panel-border);
    overflow-y: auto;
    padding: 10px;
  }

  #sidebar h2 {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin: 4px 6px 10px;
  }

  .track-card {
    border: 1px solid var(--panel-border);
    background: #0b120f;
    border-radius: 3px;
    padding: 8px 10px;
    margin-bottom: 8px;
    position: relative;
  }

  .track-card.flagged {
    border-color: var(--red);
    box-shadow: 0 0 0 1px rgba(255,92,92,0.15) inset;
  }

  .track-card .row1 {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 12.5px;
    font-weight: 600;
  }

  .track-card .id {
    color: var(--phosphor);
  }

  .track-card.flagged .id {
    color: var(--red);
  }

  .track-card .kind {
    font-size: 10px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .track-card .stats {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--ink-dim);
    margin-top: 6px;
  }

  .track-card .led {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--phosphor-dim);
    margin-right: 5px;
  }

  .track-card.coasting .led {
    background: var(--amber);
    animation: pulse 1s infinite ease-in-out;
  }

  .track-card .reasons {
    margin-top: 6px;
    font-size: 10.5px;
    color: var(--red);
    line-height: 1.4;
  }

  .leaflet-popup-content-wrapper, .leaflet-popup-tip {
    background: var(--panel);
    color: var(--ink);
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
  }

  /* custom track marker */
  .track-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: var(--phosphor);
    text-shadow: 0 0 6px var(--phosphor);
  }
  .track-icon.flagged {
    color: var(--red);
    text-shadow: 0 0 8px var(--red);
  }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="title">Track Fusion <span>Common Operating Picture — synthetic sensor demo</span></div>
    <div id="status"><span class="dot"></span><span id="status-text">connecting…</span></div>
  </div>
  <div id="map"></div>
  <div id="sidebar">
    <h2>Active Tracks</h2>
    <div id="track-list"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const map = L.map('map', { zoomControl: true, attributionControl: false }).setView([48.4284, -123.3656], 12);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 19,
}).addTo(map);

const markers = {};   // id -> L.marker
const trails  = {};   // id -> L.polyline
let zoneDrawn = false;

function headingArrow(heading) {
  // simple rotated glyph via CSS transform on a div icon
  return `<div class="track-icon" style="transform: rotate(${heading}deg)">▲</div>`;
}

function upsertTrack(t) {
  const icon = L.divIcon({
    className: '',
    html: headingArrow(t.heading_deg).replace('track-icon', t.flagged ? 'track-icon flagged' : 'track-icon'),
    iconSize: [18, 18],
    iconAnchor: [9, 9],
  });

  const latlng = [t.lat, t.lon];

  if (!markers[t.id]) {
    markers[t.id] = L.marker(latlng, { icon }).addTo(map);
    trails[t.id] = L.polyline([], {
      color: t.flagged ? '#ff5c5c' : '#2a7a56',
      weight: 1.5,
      opacity: 0.8,
    }).addTo(map);
  } else {
    markers[t.id].setLatLng(latlng);
    markers[t.id].setIcon(icon);
  }

  markers[t.id].bindPopup(
    `<b>${t.id}</b> (${t.kind})<br/>` +
    `speed: ${t.speed_ms} m/s<br/>` +
    `heading: ${t.heading_deg}&deg;<br/>` +
    `${t.coasting ? 'coasting (no detection this tick)' : 'live detection'}`
  );

  if (t.trail && t.trail.length) {
    trails[t.id].setLatLngs(t.trail);
    trails[t.id].setStyle({ color: t.flagged ? '#ff5c5c' : '#2a7a56' });
  }
}

function renderSidebar(tracks) {
  const list = document.getElementById('track-list');
  list.innerHTML = '';
  tracks
    .slice()
    .sort((a, b) => (b.flagged - a.flagged) || a.id.localeCompare(b.id))
    .forEach(t => {
      const card = document.createElement('div');
      card.className = 'track-card' + (t.flagged ? ' flagged' : '') + (t.coasting ? ' coasting' : '');
      card.innerHTML = `
        <div class="row1">
          <span><span class="led"></span><span class="id">${t.id}</span></span>
          <span class="kind">${t.kind}</span>
        </div>
        <div class="stats">
          <span>spd ${t.speed_ms} m/s</span>
          <span>hdg ${t.heading_deg}&deg;</span>
        </div>
        ${t.flagged ? `<div class="reasons">${t.reasons.join('<br/>')}</div>` : ''}
      `;
      list.appendChild(card);
    });
}

function drawRestrictedZone(zone) {
  if (zoneDrawn) return;
  L.circle([zone.lat, zone.lon], {
    radius: zone.radius_m,
    color: '#f0a63b',
    weight: 1,
    fillColor: '#f0a63b',
    fillOpacity: 0.05,
    dashArray: '4 6',
  }).addTo(map).bindPopup('Restricted zone');
  zoneDrawn = true;
}

function setStatus(live) {
  const el = document.getElementById('status');
  const text = document.getElementById('status-text');
  if (live) {
    el.classList.add('live');
    text.textContent = 'live feed';
  } else {
    el.classList.remove('live');
    text.textContent = 'disconnected — retrying…';
  }
}

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}/ws/tracks`);

  ws.onopen = () => setStatus(true);
  ws.onclose = () => { setStatus(false); setTimeout(connect, 1500); };
  ws.onerror = () => ws.close();

  ws.onmessage = (evt) => {
    const msg = JSON.parse(evt.data);
    if (msg.type === 'config') {
      drawRestrictedZone(msg.restricted_zone);
    } else if (msg.type === 'tracks') {
      msg.tracks.forEach(upsertTrack);
      renderSidebar(msg.tracks);
    }
  };
}

connect();
</script>
</body>
</html>
