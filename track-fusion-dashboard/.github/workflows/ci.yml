name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Lint (flake8)
        working-directory: backend
        run: flake8 . --max-line-length=100 --exclude=tests --extend-ignore=E203,W503

      - name: Run tests
        working-directory: backend
        run: pytest -v
